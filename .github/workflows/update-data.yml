name: Update Report Data

on:
  schedule:
    # Runs daily at 06:00 UTC = 03:00 São Paulo
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      period:
        description: 'Period to generate (YYYY-MM). Leave empty for current month.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  update:
    name: Pull API data & update dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Generate report data
        env:
          REPORT_REFRESH_TOKEN:         ${{ secrets.REPORT_REFRESH_TOKEN }}
          REPORT_CLIENT_ID:             ${{ secrets.REPORT_CLIENT_ID }}
          REPORT_CLIENT_SECRET:         ${{ secrets.REPORT_CLIENT_SECRET }}
          GOOGLE_ADS_DEVELOPER_TOKEN:   ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          GOOGLE_ADS_CUSTOMER_ID:       ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GMC_MERCHANT_ID:              ${{ secrets.GMC_MERCHANT_ID }}
          GSC_SITE_URL:                 ${{ secrets.GSC_SITE_URL }}
          GA4_PROPERTY_ID:              ${{ secrets.GA4_PROPERTY_ID }}
        run: |
          PERIOD="${{ github.event.inputs.period }}"
          if [ -z "$PERIOD" ]; then
            python3 generate_data.py
          else
            python3 generate_data.py "$PERIOD"
          fi

      - name: Commit & push updated data
        run: |
          git config user.name  "Claude | Local Rank Brasil"
          git config user.email "claude@localrankbrasil.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: update $(date +%Y-%m-%d) [skip ci]"
            git push
          fi
